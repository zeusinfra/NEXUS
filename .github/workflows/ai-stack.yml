name: AI Stack

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "nexus_core/llm_service.py"
      - "nexus_core/model_router.py"
      - "nexus_core/models/**"
      - "nexus_core/cognitive/**"
      - "requirements/ai.txt"
      - ".github/workflows/ai-stack.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "nexus_core/llm_service.py"
      - "nexus_core/model_router.py"
      - "nexus_core/models/**"
      - "nexus_core/cognitive/**"
      - "requirements/ai.txt"

concurrency:
  group: ai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-ai:
    name: AI Stack Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt
          python -m pip install -r requirements/ai.txt
          python -m pip install pytest pytest-asyncio

      - name: Run AI Tests
        env:
          NEXUS_TESTING: "1"
          NEXUS_SKIP_DOTENV: "1"
        run: |
          python -m pytest \
            tests/unit/test_llm_service.py \
            tests/unit/test_model_router.py \
            tests/unit/test_cognitive_db.py \
            tests/unit/test_cognitive_execution.py \
            tests/unit/test_cognitive_learning.py \
            tests/unit/test_cognitive_planner.py \
            tests/unit/test_cognitive_simulator.py \
            tests/unit/test_cognitive_state.py

name: AI Stack

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "zeus_core/llm_service.py"
      - "zeus_core/cognitive/**"
      - "requirements/ai.txt"
      - ".github/workflows/ai-stack.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "zeus_core/llm_service.py"
      - "zeus_core/cognitive/**"
      - "requirements/ai.txt"

concurrency:
  group: ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ai:
    name: AI Stack Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt
          python -m pip install -r requirements/ai.txt
          python -m pip install pytest pytest-asyncio

      - name: Run AI Tests
        env:
          ZEUS_TESTING: "1"
          ZEUS_SKIP_DOTENV: "1"
        run: |
          # Run tests specifically related to AI and Cognition
          python -m pytest tests/unit/test_cognitive.py || echo "No specific cognitive tests found yet"

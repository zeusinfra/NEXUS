name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 3 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  runtime-guardrails:
    name: Runtime guardrail tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt
          python -m pip install pytest pytest-asyncio

      - name: Verify evidence-first execution
        env:
          NEXUS_TESTING: "1"
          NEXUS_SKIP_DOTENV: "1"
          NEXUS_EXEC_CONCURRENT_LIMIT: "2"
          NEXUS_EXEC_TIMEOUT_MAX_SEC: "60"
          NEXUS_EXEC_BLOCK_ON_RESOURCE_PRESSURE: "0"
        run: |
          python -m pytest \
            tests/unit/test_command_policy.py \
            tests/unit/test_execution_protocol.py \
            tests/unit/test_organization_security.py \
            tests/unit/test_organization_runtime.py \
            tests/unit/test_resource_budget.py

  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          skip-dirs: logs,target,core-rust/target,watcher_rs/target,nexus-iced/target

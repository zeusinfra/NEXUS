name: Voice Stack

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "nexus_core/asr.py"
      - "nexus_core/voice_sensing.py"
      - "communication/voice_service.py"
      - "requirements/voice.txt"
      - ".github/workflows/voice-stack.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "nexus_core/asr.py"
      - "nexus_core/voice_sensing.py"
      - "communication/voice_service.py"
      - "requirements/voice.txt"

concurrency:
  group: voice-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-voice:
    name: Voice Stack Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt
          python -m pip install -r requirements/voice.txt
          python -m pip install pytest pytest-asyncio

      - name: Run Voice Tests
        env:
          NEXUS_TESTING: "1"
          NEXUS_SKIP_DOTENV: "1"
        run: |
          python -m py_compile nexus_core/asr.py nexus_core/voice_sensing.py
          python -m pytest tests/unit/test_response_text_voice.py

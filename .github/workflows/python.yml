name: Python

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "requirements/**"
      - "requirements.txt"
      - "pytest.ini"
      - "pyproject.toml"
      - ".github/workflows/python.yml"
  pull_request:
    branches: ["main"]

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            pyproject.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libudev-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -r requirements/dev.txt

      - name: Build Rust Bridge (nexus_synapse)
        run: |
          cd core-rust/nexus_synapse
          maturin build --release --interpreter python3 --out ../../target/wheels
          pip install ../../target/wheels/*.whl

      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Test
        env:
          NEXUS_TESTING: "1"
          NEXUS_SKIP_DOTENV: "1"
        run: python -m pytest

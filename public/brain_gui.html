<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #05070a;
            color: #e0f0ff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #neural-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0a111a 0%, #05070a 100%);
        }
        .ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            background: radial-gradient(circle at center, transparent 30%, rgba(5,7,10,0.4) 100%);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 8px;
            color: #ff2df0;
            text-shadow: 0 0 20px rgba(255,45,240,0.5);
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .metric {
            border-left: 2px solid rgba(0,229,255,0.3);
            padding-left: 12px;
        }
        .metric-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }
        .metric-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #00e5ff;
        }
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 5;
            background: linear-gradient(0deg, rgba(0, 229, 255, 0.02) 0%, transparent 100%);
            position: absolute;
            bottom: 100%;
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            from { bottom: 100%; }
            to { bottom: -100px; }
        }
    </style>
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    <div class="scanline"></div>
    <div class="ui-overlay">
        <div class="header">
            <div class="logo">ZEUS NEURAL</div>
            <div style="font-size: 0.7rem; color: #00ff88; letter-spacing: 2px;">● BIOLOGICAL CORE ACTIVE</div>
        </div>
        <div class="footer">
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Synaptic Load</div>
                    <div class="metric-value" id="load">0.0%</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Neural Flow</div>
                    <div class="metric-value" id="fps">60 FPS</div>
                </div>
            </div>
            <div style="text-align: right; opacity: 0.3; font-size: 0.5rem; letter-spacing: 1px;">
                COGNITIVE ENGINE V2.4<br>NEURAL HUD INTERFACE
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        const loadEl = document.getElementById('load');
        const fpsEl = document.getElementById('fps');

        let W, H;
        let nerves = [];
        let particles = [];
        let time = 0;
        let systemLoad = 0;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            initNerves();
        }
        window.addEventListener('resize', resize);

        class Nerve {
            constructor() {
                this.reset();
            }
            reset() {
                this.startX = W / 2;
                this.startY = H / 2;
                this.angle = Math.random() * Math.PI * 2;
                this.len = 100 + Math.random() * 300;
                this.cp1x = this.startX + Math.cos(this.angle) * this.len * 0.5 + (Math.random() - 0.5) * 100;
                this.cp1y = this.startY + Math.sin(this.angle) * this.len * 0.5 + (Math.random() - 0.5) * 100;
                this.cp2x = this.startX + Math.cos(this.angle) * this.len * 0.8 + (Math.random() - 0.5) * 150;
                this.cp2y = this.startY + Math.sin(this.angle) * this.len * 0.8 + (Math.random() - 0.5) * 150;
                this.endX = this.startX + Math.cos(this.angle) * this.len + (Math.random() - 0.5) * 200;
                this.endY = this.startY + Math.sin(this.angle) * this.len + (Math.random() - 0.5) * 200;
                this.color = Math.random() > 0.5 ? '#ff2df0' : '#00e5ff';
                this.life = 0;
                this.speed = 0.005 + Math.random() * 0.01;
                this.beadPos = Math.random();
            }
            draw() {
                this.beadPos += this.speed * (1 + systemLoad / 50);
                if (this.beadPos > 1) this.beadPos = 0;

                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.bezierCurveTo(this.cp1x, this.cp1y, this.cp2x, this.cp2y, this.endX, this.endY);
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = 0.1 + Math.sin(time * 2 + this.angle) * 0.05;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Signal bead
                const t = this.beadPos;
                const cx = (1-t)**3 * this.startX + 3*(1-t)**2*t * this.cp1x + 3*(1-t)*t**2 * this.cp2x + t**3 * this.endX;
                const cy = (1-t)**3 * this.startY + 3*(1-t)**2*t * this.cp1y + 3*(1-t)*t**2 * this.cp2y + t**3 * this.endY;

                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function initNerves() {
            nerves = [];
            for (let i = 0; i < 80; i++) nerves.push(new Nerve());
        }

        function drawCore() {
            const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 150);
            grad.addColorStop(0, 'rgba(255, 45, 240, 0.4)');
            grad.addColorStop(0.5, 'rgba(0, 229, 255, 0.1)');
            grad.addColorStop(1, 'rgba(5, 7, 10, 0)');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(W/2, H/2, 200 + Math.sin(time) * 20, 0, Math.PI * 2);
            ctx.fill();

            // Inner core
            ctx.beginPath();
            ctx.arc(W/2, H/2, 40 + Math.sin(time * 3) * 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.2;
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ff2df0';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function frame() {
            time += 0.02;
            ctx.clearRect(0, 0, W, H);
            ctx.globalCompositeOperation = 'screen';
            
            drawCore();
            nerves.forEach(n => n.draw());
            
            if (Math.random() < 0.1) {
                loadEl.textContent = (Math.random() * 100).toFixed(1) + '%';
            }
            
            requestAnimationFrame(frame);
        }

        resize();
        frame();

        // Socket.IO sync
        if (window.io) {
            const socket = io();
            socket.on('message', data => {
                if (data.type === 'METRICS') systemLoad = data.cpu[0] || 0;
            });
        }
    </script>
</body>
</html>

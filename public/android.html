<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>ZEUS Mobile OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --chat-user: rgba(88, 166, 255, 0.15);
            --chat-ai: rgba(48, 54, 61, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(88, 166, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(63, 185, 80, 0.05) 0%, transparent 50%);
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header */
        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .brand h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
            transition: all 0.3s ease;
        }

        .status-indicator.online .dot {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
            flex-shrink: 0;
            z-index: 5;
        }

        .metric-card {
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .metric-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }

        /* Objectives */
        .objectives-panel {
            grid-column: 1 / -1;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .obj-label { color: var(--accent); font-weight: 600; }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            align-self: flex-end;
            background: var(--chat-user);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .msg-ai {
            align-self: flex-start;
            background: var(--chat-ai);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .msg-sys {
            align-self: center;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(210, 153, 34, 0.1);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            max-width: 90%;
            text-align: center;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
            z-index: 10;
        }

        .input-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input[type="text"]::placeholder { color: var(--text-muted); }

        .btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            color: white;
            font-size: 1.2rem;
        }

        .btn-send {
            background: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-send:active { transform: scale(0.9); }

        .btn-voice {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            position: relative;
        }

        .btn-voice.recording {
            background: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(248, 81, 73, 0.6);
            animation: pulse-record 1.5s infinite;
        }

        @keyframes pulse-record {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(248, 81, 73, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: toastEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, toastExit 0.3s ease-in 3s forwards;
        }
        
        .toast.info { border-left: 3px solid var(--accent); }
        .toast.warning { border-left: 3px solid var(--warning); }
        .toast.critical { border-left: 3px solid var(--danger); }

        @keyframes toastEnter {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastExit {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-20px) scale(0.9); }
        }
        
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        #authOverlay.hidden { display: none; }
        
        .auth-box {
            width: 80%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;
        }
        .auth-box input {
            padding: 12px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: white;
        }
        .auth-box button {
            padding: 12px; border-radius: 8px; background: var(--accent); color: white; border: none; font-weight: bold;
        }
    </style>
</head>
<body>

	    <div id="authOverlay">
	        <h1 style="color:var(--accent); font-family:'JetBrains Mono'">ZEUS AUTH</h1>
	        <div class="auth-box">
	            <input type="password" id="mobileSecretInput" placeholder="ZEUS_MOBILE_TOKEN">
	            <input type="password" id="lanTokenInput" placeholder="ZEUS_LAN_TOKEN (LAN)">
	            <button id="btnConnect">CONNECT</button>
	        </div>
	    </div>

    <header class="glass">
        <div class="brand">
            <h1>ZEUS</h1>
        </div>
        <div class="status-indicator" id="connStatus">
            <span class="dot"></span>
            <span id="connText">OFFLINE</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="metric-card glass">
            <div class="metric-title">CPU</div>
            <div class="metric-value" id="cpuVal">0%</div>
        </div>
        <div class="metric-card glass">
            <div class="metric-title">RAM</div>
            <div class="metric-value" id="ramVal">0%</div>
        </div>
        <div class="objectives-panel glass">
            <span class="obj-label">MOOD:</span>
            <span id="moodVal" style="color:white; font-weight:600;">CALM</span>
            <span style="color:var(--text-muted); margin-left: auto;">TASKS: <span id="tasksVal" style="color:white;">0</span></span>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="chat-container" id="chat">
        <div class="message msg-sys">Conexão estabelecida com o Cérebro ZEUS.</div>
    </div>

    <div class="input-area">
        <button class="btn btn-voice" id="btnVoice">🎙️</button>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Envie um comando..." autocomplete="off">
        </div>
        <button class="btn btn-send" id="btnSend">➤</button>
    </div>

    <script>
	        const DOM = {
	            authOverlay: document.getElementById('authOverlay'),
	            mobileSecretInput: document.getElementById('mobileSecretInput'),
	            lanTokenInput: document.getElementById('lanTokenInput'),
	            btnConnect: document.getElementById('btnConnect'),
	            connStatus: document.getElementById('connStatus'),
	            connText: document.getElementById('connText'),
            cpuVal: document.getElementById('cpuVal'),
            ramVal: document.getElementById('ramVal'),
            moodVal: document.getElementById('moodVal'),
            tasksVal: document.getElementById('tasksVal'),
            chat: document.getElementById('chat'),
            msgInput: document.getElementById('msgInput'),
            btnSend: document.getElementById('btnSend'),
            btnVoice: document.getElementById('btnVoice'),
            toastContainer: document.getElementById('toastContainer')
        };

	        let ws = null;
	        let mediaRecorder = null;
	        let audioChunks = [];
	        let isRecording = false;
	        
	        // Carrega tokens salvos
	        const savedMobileSecret = localStorage.getItem('zeus_mobile_secret') || '';
	        const savedLanToken = localStorage.getItem('ZEUS_LAN_TOKEN') || '';
	        const savedJwt = localStorage.getItem('zeus_mobile_jwt') || '';
	        DOM.mobileSecretInput.value = savedMobileSecret;
	        DOM.lanTokenInput.value = savedLanToken;

	        DOM.btnConnect.addEventListener('click', () => {
	            const mobileSecret = DOM.mobileSecretInput.value.trim();
	            const lanToken = DOM.lanTokenInput.value.trim();
	            if(!mobileSecret) return;
	            localStorage.setItem('zeus_mobile_secret', mobileSecret);
	            if(lanToken) localStorage.setItem('ZEUS_LAN_TOKEN', lanToken);
	            bootstrapMobile(mobileSecret, lanToken);
	        });

	        async function bootstrapMobile(mobileSecret, lanToken){
	            try{
	                const jwt = await loginMobile(mobileSecret, lanToken);
	                localStorage.setItem('zeus_mobile_jwt', jwt);
	                DOM.authOverlay.classList.add('hidden');
	                connectWebSocket(jwt, lanToken);
	                startStatusPolling(lanToken);
	            }catch(e){
	                showToast('Falha de login: ' + (e?.message || e), 'critical');
	            }
	        }

	        async function loginMobile(mobileSecret, lanToken){
	            const headers = {'content-type':'application/json'};
	            if(lanToken) headers['x-zeus-token'] = lanToken;
	            const res = await fetch('/api/mobile/login', {
	                method:'POST',
	                headers,
	                body: JSON.stringify({token: mobileSecret})
	            });
	            if(!res.ok) throw new Error(await res.text());
	            const data = await res.json();
	            const jwt = data && data.access_token;
	            if(!jwt) throw new Error('JWT ausente na resposta.');
	            return jwt;
	        }

	        function connectWebSocket(jwt, lanToken) {
	            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
	            const lan = lanToken ? `&lan=${encodeURIComponent(lanToken)}` : '';
	            const wsUrl = `${protocol}//${location.host}/ws/mobile?token=${encodeURIComponent(jwt)}${lan}`;
	            
	            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                DOM.connStatus.classList.add('online');
                DOM.connText.textContent = 'ONLINE';
                appendMessage('sys', 'WebSocket Conectado.');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'CHAT_AI' || data.type === 'CHAT_USER') {
                        appendMessage(data.type === 'CHAT_AI' ? 'ai' : 'user', data.message);
                        if(data.type === 'CHAT_AI') speakText(data.message);
                    }
                    else if (data.type === 'alert' || data.type === 'SYSTEM_EVENT') {
                        const lvl = data.level || (data.pressure === 'critical' ? 'critical' : 'info');
                        const msg = data.message || (data.log && data.log.detail) || 'Alerta de sistema';
                        showToast(msg, lvl);
                    }
                    else if (data.type === 'voice' && data.payload && data.payload.text) {
                        speakText(data.payload.text);
                    }
                } catch(e) { console.error('WS parse error:', e); }
            };

	            ws.onclose = () => {
	                DOM.connStatus.classList.remove('online');
	                DOM.connText.textContent = 'OFFLINE';
	                appendMessage('sys', 'Desconectado. Reconectando em 5s...');
	                setTimeout(() => connectWebSocket(jwt, lanToken), 5000);
	            };
	        }

	        async function startStatusPolling(lanToken) {
	            setInterval(async () => {
	                try {
	                    const headers = {};
	                    if(lanToken) headers['x-zeus-token'] = lanToken;
	                    const res = await fetch('/api/status', {headers});
	                    if(res.ok) {
	                        const data = await res.json();
	                        DOM.cpuVal.textContent = `${data.cpu}%`;
	                        DOM.ramVal.textContent = `${data.ram}%`;
                        DOM.moodVal.textContent = data.mood || 'CALM';
                        DOM.tasksVal.textContent = data.active_tasks || '0';
	        }
                } catch(e) {}
            }, 3000);
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message msg-${role}`;
            div.textContent = text;
            DOM.chat.appendChild(div);
            DOM.chat.scrollTop = DOM.chat.scrollHeight;
        }

        function showToast(message, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = message;
            DOM.toastContainer.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        function sendMessage() {
            const text = DOM.msgInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            ws.send(JSON.stringify({
                type: 'chat',
                payload: { text }
            }));
            DOM.msgInput.value = '';
        }

        DOM.btnSend.addEventListener('click', sendMessage);
        DOM.msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Voice Recording via MediaRecorder
        async function setupVoice() {
            if (!navigator.mediaDevices) return showToast('Microfone não suportado', 'warning');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const base64data = reader.result;
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({
                                type: 'voice',
                                payload: { audio: base64data }
                            }));
                            appendMessage('sys', 'Áudio enviado para processamento...');
                        }
                    };
                };
            } catch(e) {
                showToast('Permissão de mic negada.', 'critical');
            }
        }

        DOM.btnVoice.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (!mediaRecorder) setupVoice().then(startRec);
            else startRec();
        });

        DOM.btnVoice.addEventListener('pointerup', stopRec);
        DOM.btnVoice.addEventListener('pointercancel', stopRec);

        function startRec() {
            if (!mediaRecorder) return;
            isRecording = true;
            DOM.btnVoice.classList.add('recording');
            audioChunks = [];
            mediaRecorder.start();
        }

        function stopRec() {
            if (!isRecording || !mediaRecorder) return;
            isRecording = false;
            DOM.btnVoice.classList.remove('recording');
            setTimeout(() => mediaRecorder.stop(), 500); // Pad audio
        }

        function speakText(text) {
            if(!window.speechSynthesis) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'pt-BR';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }
        
        // Attempt setup eagerly
        setupVoice();
    </script>
</body>
</html>

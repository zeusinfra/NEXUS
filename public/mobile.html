<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050b12" />
  <title>ZEUS Mobile Link</title>
  <link rel="manifest" href="/static/manifest.json" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root{
      --bg:#050b12;--panel:rgba(6,18,32,.62);--stroke:rgba(0,229,255,.18);
      --c:#00e5ff;--muted:rgba(224,240,255,.72);--muted2:rgba(224,240,255,.52);
      --good:#5cffc5;--warn:#ffd278;--bad:#ff6b9e;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:radial-gradient(1200px 800px at 20% 0%,rgba(0,229,255,.08),transparent 55%),
                 radial-gradient(900px 650px at 90% 20%,rgba(92,255,197,.06),transparent 60%),
                 var(--bg);color:rgba(224,240,255,.92);font-family:var(--sans);overflow-x:hidden}
    .wrap{max-width:820px;margin:0 auto;padding:14px 14px 100px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px}
    .brand{display:flex;flex-direction:column;gap:2px}
    .brand .t{font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;font-size:.92rem;color:rgba(224,240,255,.9);font-weight:bold}
    .brand .s{font-family:var(--mono);font-size:.72rem;color:var(--muted2)}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:.42rem .62rem;border-radius:999px;border:1px solid var(--stroke);background:rgba(0,0,0,.18);font-family:var(--mono);font-size:.72rem;color:var(--muted);transition:all .3s ease}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(224,240,255,.25);box-shadow:0 0 0 rgba(0,0,0,0)}
    .chip.online .dot{background:var(--good);box-shadow:0 0 10px rgba(92,255,197,.2)}
    .chip.offline .dot{background:var(--bad);box-shadow:0 0 10px rgba(255,107,158,.22)}
    .grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
    .card{border:1px solid var(--stroke);background:var(--panel);border-radius:20px;padding:12px;box-shadow:0 0 26px rgba(0,229,255,.06);backdrop-filter: blur(12px)}
    .card h2{margin:0 0 10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;font-size:.72rem;color:rgba(224,240,255,.5)}
    .status{display:flex;flex-wrap:wrap;gap:10px}
    .kv{flex:1;min-width:120px;border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:10px;background:rgba(0,0,0,.25)}
    .kv .k{font-family:var(--mono);font-size:.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em}
    .kv .v{margin-top:4px;font-family:var(--mono);font-size:.85rem;color:rgba(224,240,255,.92);font-weight:bold}
    
    .ctrl-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-top:12px}
    .btn-mode{border:1px solid var(--stroke);background:rgba(0,0,0,.3);color:var(--muted);font-family:var(--mono);font-size:.6rem;padding:8px 4px;border-radius:12px;cursor:pointer;transition:all .2s}
    .btn-mode.active{background:var(--c);color:var(--bg);border-color:var(--c);box-shadow:0 0 10px var(--c)}
    
    .btn-panic{width:100%;margin-top:12px;background:rgba(255,107,158,0.2);border:1px solid var(--bad);color:var(--bad);font-family:var(--mono);font-weight:bold;padding:12px;border-radius:16px;cursor:pointer;text-transform:uppercase;transition:all .2s}
    .btn-panic:active{background:var(--bad);color:white}
    
    .blackboard-view{margin-top:15px;border-top:1px solid var(--stroke);padding-top:12px}
    .bb-item{display:flex;justify-content:space-between;padding:4px 0;font-family:var(--mono);font-size:.7rem;border-bottom:1px solid rgba(255,255,255,.03)}
    .bb-item .k{color:var(--muted2)}
    .bb-item .v{color:var(--c);text-align:right;max-width:60%}
    
    .neural-core-wrap{display:flex;justify-content:center;align-items:center;padding:20px 0;perspective:1000px}
    .neural-core{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle, var(--c) 0%, transparent 70%);box-shadow:0 0 30px var(--c);position:relative;transition:all 0.5s ease;animation:core-breathe 4s infinite ease-in-out}
    .neural-core.active{animation: core-breathe 1.5s infinite ease-in-out; box-shadow:0 0 50px var(--c)}
    .neural-core.stressed{background:radial-gradient(circle, var(--bad) 0%, transparent 70%);box-shadow:0 0 50px var(--bad); animation: core-breathe 0.8s infinite ease-in-out}
    .neural-core.calm{background:radial-gradient(circle, var(--good) 0%, transparent 70%);box-shadow:0 0 30px var(--good); animation: core-breathe 6s infinite ease-in-out}
    
    .core-pulse{position:absolute;border:2px solid var(--c);border-radius:50%;width:80px;height:80px;opacity:0;pointer-events:none;animation:pulse-out 0.8s ease-out forwards}
    
    @keyframes core-breathe { 0%, 100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.1);opacity:1} }
    @keyframes pulse-out { 0%{transform:scale(1);opacity:0.8;border-width:4px} 100%{transform:scale(3);opacity:0;border-width:1px} }
    
    .chat{display:flex;flex-direction:column;gap:10px}

    .msgs{display:flex;flex-direction:column;gap:10px;max-height:55vh;overflow-y:auto;padding-right:4px;scroll-behavior:smooth}
    .msg{border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:10px 12px;background:rgba(0,0,0,.25);animation:slideUp .2s ease-out}
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg .r{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px}
    .msg .t{white-space:pre-wrap;word-break:break-word;font-size:0.95rem;line-height:1.4}
    .msg.user{border-color:rgba(92,255,197,.3);background:rgba(92,255,197,.05)}
    .msg.ai{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.05)}
    .msg.sys{border-color:rgba(255,210,120,.3);background:rgba(255,210,120,.05)}
    .msg.pending{opacity:.6;filter:grayscale(0.5)}
    .notification-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--panel);border:1px solid var(--c);padding:12px 20px;border-radius:20px;backdrop-filter:blur(15px);color:var(--c);font-family:var(--mono);font-size:.75rem;animation:toastIn .3s ease-out, toastOut .3s ease-in .3s forwards;pointer-events:none}
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-20px)} }
    .feed{display:flex;flex-direction:column;gap:8px;max-height:20vh;overflow-y:auto}
    .feed .e{border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:8px;background:rgba(0,0,0,.2)}
    .feed .e .k{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2)}
    .feed .e .v{margin-top:4px;font-family:var(--mono);font-size:.7rem;color:rgba(224,240,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar{position:fixed;left:0;right:0;bottom:0;padding:env(safe-area-inset-bottom) 12px 12px;background:rgba(4,10,16,.95);border-top:1px solid rgba(0,229,255,.15);backdrop-filter: blur(20px);z-index:100}
    .bar .inner{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
    textarea{flex:1;min-height:48px;max-height:150px;resize:none;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:rgba(224,240,255,.92);padding:12px;font-family:var(--sans);outline:none;font-size:16px}
    button{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(0,229,255,.15);color:rgba(224,240,255,.92);padding:12px 16px;font-family:var(--mono);cursor:pointer;font-weight:bold;transition:all .2s ease}
    button:active{transform:scale(0.95);background:rgba(0,229,255,.25)}
    .btnRow{display:flex;gap:8px;align-items:center}
    .btnUpload{background:rgba(92,255,197,.12);border-color:rgba(92,255,197,.2);color:var(--good);font-family:var(--mono);font-weight:bold;padding:12px;border-radius:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
    .btnUpload:active{background:var(--good);color:var(--bg)}
    .btnRec{background:rgba(255,107,158,.15);border-color:rgba(255,107,158,.2)}
    .btnRec.recording{background:rgba(255,107,158,.3);border-color:var(--bad);box-shadow:0 0 15px rgba(255,107,158,.3);animation:pulse 1.5s infinite}
    @keyframes pulse { 0%{opacity:1} 50%{opacity:0.7} 100%{opacity:1} }
    .tog{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
    .tog label{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:.7rem;color:var(--muted);cursor:pointer}
    input[type="text"]{border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.25);color:rgba(224,240,255,.9);padding:8px 10px;font-family:var(--mono);width:120px;outline:none;font-size:14px}
    input[type="checkbox"]{accent-color:var(--c);width:18px;height:18px}
    @media(min-width:780px){.grid{grid-template-columns:1fr 1.2fr}}
  </style>

</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="t">ZEUS Mobile Link</div>
        <div class="s">Chat + Voz no seu celular, ligado ao cérebro</div>
      </div>
      <div id="conn" class="chip offline"><span class="dot"></span><span id="connTxt">Offline</span></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Estado</h2>
        <div class="status">
          <div class="kv"><div class="k">Voz</div><div class="v" id="voiceStage">idle</div></div>
          <div class="kv"><div class="k">Humor</div><div class="v" id="mood">—</div></div>
          <div class="kv"><div class="k">CPU</div><div class="v" id="cpu">—</div></div>
          <div class="kv"><div class="k">RAM</div><div class="v" id="ram">—</div></div>
        </div>

        <div class="neural-core-wrap">
          <div id="neuralCore" class="neural-core"></div>
        </div>
        
        <div class="ctrl-grid">
          <button class="btn-mode" id="mode-safe">SAFE</button>
          <button class="btn-mode" id="mode-dev">DEV</button>
          <button class="btn-mode" id="mode-auto">AUTO</button>
        </div>
        <button class="btn-panic" id="panic-btn">🚨 EMERGENCY STOP</button>

        <div class="blackboard-view">
          <h2>🧠 Blackboard Sync</h2>
          <div id="bb-content">
            <div class="bb-item"><span class="k">Status</span><span class="v">Sincronizando...</span></div>
          </div>
        </div>

        <div class="tog">
          <label><input type="checkbox" id="reqWake" checked /> exigir wake</label>
          <input id="wakeWord" type="text" value="zeus" />
          <label><input type="checkbox" id="ttsOn" checked /> falar no celular</label>
        </div>
        <div class="tog" style="margin-top:8px">
          <span class="chip"><span class="dot" style="background:rgba(255,210,120,.6)"></span><span id="hud">Aguardando atividade neural...</span></span>
        </div>
        <div class="tog" style="margin-top:10px">
          <span class="chip"><span class="dot" style="background:rgba(0,229,255,.6)"></span><span id="hostInfo">Host: —</span></span></span>
        </div>
        <div class="tog" style="margin-top:10px">
          <div style="width:100%">
            <h2 style="margin:0 0 8px">Feed Neural</h2>
            <div class="feed" id="feed"></div>
          </div>
        </div>

        <div class="tog">
          <label><input type="checkbox" id="reqWake" checked /> exigir wake</label>
          <input id="wakeWord" type="text" value="zeus" />
          <label><input type="checkbox" id="ttsOn" checked /> falar no celular</label>
        </div>
        <div class="tog" style="margin-top:8px">
          <span class="chip"><span class="dot" style="background:rgba(255,210,120,.6)"></span><span id="hud">Aguardando atividade neural...</span></span>
        </div>
        <div class="tog" style="margin-top:10px">
          <span class="chip"><span class="dot" style="background:rgba(0,229,255,.6)"></span><span id="hostInfo">Host: —</span></span>
        </div>
        <div class="tog" style="margin-top:10px">
          <div style="width:100%">
            <h2 style="margin:0 0 8px">Feed Neural</h2>
            <div class="feed" id="feed"></div>
          </div>
        </div>
      </div>

      <div class="card chat">
        <h2>Chat</h2>
        <div class="msgs" id="msgs"></div>
      </div>
    </div>
  </div>

    <div class="bar">
      <div class="inner">
        <textarea id="text" placeholder="Digite ou use o microfone…"></textarea>
        <div class="btnRow">
          <button id="upload-btn" class="btnUpload" title="Enviar Mídia para Memória">📁</button>
          <button id="send">Enviar</button>
          <button id="rec" class="btnRec">Gravar</button>
        </div>
      </div>
    </div>


  <script>
    const conn = document.getElementById('conn');
    const connTxt = document.getElementById('connTxt');
    const msgs = document.getElementById('msgs');
    const feed = document.getElementById('feed');
    const hud = document.getElementById('hud');
    const voiceStage = document.getElementById('voiceStage');
    const mood = document.getElementById('mood');
    const cpu = document.getElementById('cpu');
    const ram = document.getElementById('ram');
    const reqWake = document.getElementById('reqWake');
    const wakeWord = document.getElementById('wakeWord');
    const ttsOn = document.getElementById('ttsOn');
    const sendBtn = document.getElementById('send');
    const recBtn = document.getElementById('rec');
    const textEl = document.getElementById('text');
    let fileInput = null;
    const hostInfo = document.getElementById('hostInfo');
    const bbContent = document.getElementById('bb-content');
    const panicBtn = document.getElementById('panic-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const neuralCore = document.getElementById('neuralCore');
    const modeBtns = {
      safe: document.getElementById('mode-safe'),
      dev: document.getElementById('mode-dev'),
      auto: document.getElementById('mode-auto')
    };

    let socket = null;
    let recorder = null;
    let recorded = [];
    let ttsUnlocked = false;
    const seenIds = new Set();
    const pendingById = new Map();


    const clientIdKey = 'zeus_mobile_client_id';
    const clientId = (() => {
      let v = '';
      try{ v = String(localStorage.getItem(clientIdKey) || ''); }catch(_e){}
      if(!v){
        v = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('m_' + Math.random().toString(16).slice(2));
        try{ localStorage.setItem(clientIdKey, v); }catch(_e){}
      }
      return v;
    })();

    function updateCoreVisuals(moodStr) {
      if (!neuralCore) return;
      neuralCore.className = 'neural-core';
      const m = String(moodStr || '').toUpperCase();
      if (m === 'ACTIVE') neuralCore.classList.add('active');
      else if (m === 'STRESSED' || m === 'CRITICAL') neuralCore.classList.add('stressed');
      else neuralCore.classList.add('calm');
    }

    function triggerNeuralPulse(color) {
      if (!neuralCore) return;
      const pulse = document.createElement('div');
      pulse.className = 'core-pulse';
      if (color) pulse.style.borderColor = color;
      neuralCore.appendChild(pulse);
      setTimeout(() => pulse.remove(), 800);
    }

    function updateBlackboard(data) {
      if (!bbContent) return;
      bbContent.innerHTML = '';
      if (!data || Object.keys(data).length === 0) {
        bbContent.innerHTML = '<div class="bb-item"><span class="k">Status</span><span class="v">Vazio</span></div>';
        return;
      }
      for (const [key, val] of Object.entries(data)) {
        let displayVal = val;
        if (typeof val === 'object') displayVal = JSON.stringify(val);
        if (String(displayVal).length > 50) displayVal = String(displayVal).substring(0, 47) + '...';
        const item = document.createElement('div');
        item.className = 'bb-item';
        item.innerHTML = `<span class="k">${key}</span><span class="v">${displayVal}</span>`;
        bbContent.appendChild(item);
      }
    }

    function setMode(mode) {
      for (const m in modeBtns) {
        if (modeBtns[m]) modeBtns[m].classList.remove('active');
      }
      if (modeBtns[mode]) modeBtns[mode].classList.add('active');
      addFeed('sys', `Modo alterado para ${String(mode).toUpperCase()}`);
    }

    function triggerPanic() {
      addFeed('os', 'EMERGENCY STOP acionado!');
    }

    function addMsg(role, text, opts={}){
      const id = opts.id || null;
      if(id){
        if(seenIds.has(id)) return;
        seenIds.add(id);
      }
      const el = document.createElement('div');
      el.className = 'msg ' + role + (opts.pending ? ' pending' : '');
      if(id) el.dataset.id = id;
      const r = document.createElement('div');
      r.className = 'r';
      r.textContent = role === 'user' ? 'USER' : role === 'ai' ? 'ZEUS' : 'SYSTEM';
      const t = document.createElement('div');
      t.className = 't';
      t.textContent = String(text || '');
      el.appendChild(r);
      el.appendChild(t);
      msgs.appendChild(el);
      msgs.scrollTop = msgs.scrollHeight;
      if(msgs.children.length > 140){
        try{ msgs.removeChild(msgs.firstChild); }catch(_e){}
      }
      if(role === 'ai' && ttsOn.checked && ttsUnlocked){
        try{
          const u = new SpeechSynthesisUtterance(String(text || ''));
          u.lang = 'pt-BR';
          u.rate = 1.05;
          speechSynthesis.cancel();
          speechSynthesis.speak(u);
        }catch(_e){}
      }
    }

    function addFeed(kind, detail){
      const el = document.createElement('div');
      el.className = 'e';
      const k = document.createElement('div');
      k.className = 'k';
      k.textContent = String(kind || 'event');
      const v = document.createElement('div');
      v.className = 'v';
      v.textContent = String(detail || '');
      el.appendChild(k);
      el.appendChild(v);
      feed.prepend(el);
      
      if(kind === 'insight' || kind === 'os'){
        showToast(`ZEUS: ${detail}`);
      }

      while(feed.children.length > 25){
        try{ feed.removeChild(feed.lastChild); }catch(_e){ break; }
      }
    }

    function showToast(text){
      const t = document.createElement('div');
      t.className = 'notification-toast';
      t.textContent = text;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function setOnline(ok){
      conn.classList.toggle('online', !!ok);
      conn.classList.toggle('offline', !ok);
      connTxt.textContent = ok ? 'Online' : 'Offline';
    }

    let pollingInterval = null;

    function startPolling(){
      if(pollingInterval) return;
      console.log("Switching to Long Polling mode...");
      setOnline(true); // Marcamos como online pois o Polling funciona via HTTP
      pollingInterval = setInterval(async () => {
        try {
          const res = await fetch('/status', {
            headers: {
              'x-zeus-client-id': clientId,
              'x-zeus-token': (localStorage.getItem('ZEUS_LAN_TOKEN') || '').trim(),
            }
          });
          const data = await res.json();
          
          // Update Metrics
          mood.textContent = data.mood || '—';
          updateCoreVisuals(data.mood);
          const c = Array.isArray(data.cpu) && data.cpu.length ? (data.cpu.reduce((a,b)=>a+b,0)/data.cpu.length) : Number(data.cpu || 0);
          cpu.textContent = Math.round(c) + '%';
          ram.textContent = Math.round(data.ram || 0) + '%';
          
          // PROCESS PENDING MESSAGES FROM SERVER
          if(data.messages && data.messages.length > 0){
            data.messages.forEach(msg => {
              if(msg.type === 'CHAT_AI') addMsg('ai', msg.message, {id: msg.id});
              if(msg.type === 'CHAT_USER') addMsg('user', msg.message, {id: msg.id});
              if(msg.type === 'AI_INSIGHT') addFeed('insight', msg.message);
              if(msg.type === 'SYSTEM_EVENT') addFeed('os', msg.log?.detail || 'system');
              
              // Trigger Visual Pulse for every message received via polling
              triggerNeuralPulse();
            });
          }
        } catch(e) {
          console.error("Polling error:", e);
        }
      }, 3000);
    }

    function stopPolling(){
      if(pollingInterval){
        clearInterval(pollingInterval);
        pollingInterval = null;
        console.log("Polling stopped. Realtime active.");
      }
    }

    function connect(){
      try{ if(socket) socket.disconnect(); }catch(_e){}
      
      const url = `http://${location.host}`;
      console.log("Attempting to connect via Socket.io to:", url);
      
      socket = io(url, {
        transports: ['websocket', 'polling'],
        auth: ((localStorage.getItem('ZEUS_LAN_TOKEN') || '').trim()) ? { token: (localStorage.getItem('ZEUS_LAN_TOKEN') || '').trim() } : {},
        reconnection: true,
        reconnectionAttempts: Infinity,
        reconnectionDelay: 2000
      });
      
      socket.on("connect", () => {
        console.log("Socket.io Connected!");
        setOnline(true);
        stopPolling();
      });
      
      socket.on("disconnect", () => {
        console.log("Socker.io Disconnected");
        setOnline(false);
        startPolling();
      });

      socket.on("connect_error", (err) => {
        console.error("Connection error:", err);
        setOnline(false);
        startPolling();
      });

      socket.on("message", (d) => {
        if(!d) return;
        if(d.type === 'HUD_STATUS' && d.text) hud.textContent = d.text;
        if(d.type === 'VOICE_STATE' && d.stage) voiceStage.textContent = d.stage;
        if(d.type === 'METRICS'){
          mood.textContent = d.mood || '—';
          updateCoreVisuals(d.mood);
          const c = Array.isArray(d.cpu) && d.cpu.length ? (d.cpu.reduce((a,b)=>a+b,0)/d.cpu.length) : Number(d.cpu || 0);
          cpu.textContent = Math.round(c) + '%';
          ram.textContent = Math.round(Number(d.ram || 0)) + '%';
          if(d.learning?.hottest_path) addFeed('focus', d.learning.hottest_path);
        }
        if(d.type === 'SYNAPSE_FIRE'){
          triggerNeuralPulse(d.color || 'var(--c)');
        }
        if(d.type === 'FILE_EVENT_BATCH' || d.type === 'SYSTEM_EVENT'){
          triggerNeuralPulse();
        }
        if(d.type === 'BLACKBOARD_SYNC' && d.data){
          updateBlackboard(d.data);
        }
        if(d.type === 'CHAT_USER') addMsg('user', d.message, {id: d.id});
        if(d.type === 'CHAT_AI'){
          if(d.id && pendingById.has(d.id)){
            const pendingEl = pendingById.get(d.id);
            try{ pendingEl.classList.remove('pending'); }catch(_e){}
            pendingById.delete(d.id);
          }
          addMsg('ai', d.message, {id: d.id});
        }
        if(d.type === 'TOOL_LOG') addFeed('tool', `${d.tool||'tool'} · ${d.stage||''}`);
        if(d.type === 'SYSTEM_EVENT') addFeed('os', d.log?.detail || d.pressure || 'system');
        if(d.type === 'WEB_EVENT') addFeed('web', d.url || d.domain || 'web');
        if(d.type === 'AI_INSIGHT') addFeed('insight', d.message || 'insight');
        if(d.type === 'AUDIT_REPORT') addFeed('audit', d.message || d.status || 'audit');
      });
    }

    async function postJson(path, payload){
      const res = await fetch(path, {
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-zeus-client':'mobile',
          'x-zeus-client-id':clientId,
          'x-zeus-token': (localStorage.getItem('ZEUS_LAN_TOKEN') || '').trim(),
        },
        body:JSON.stringify(payload||{})
      });
      if(!res.ok) throw new Error(await res.text());
      return await res.json();
    }

    async function sendText(message){
      const msg = String(message||'').trim();
      if(!msg) return;
      textEl.value = '';
      ttsUnlocked = true;
      const msgId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('c_' + Date.now() + '_' + Math.random().toString(16).slice(2));
      addMsg('user', msg, {id: msgId});
      try{
        // Placeholder para resposta
        const ph = document.createElement('div');
        ph.className = 'msg sys pending';
        ph.dataset.id = msgId;
        ph.innerHTML = `<div class="r">SYSTEM</div><div class="t">Processando…</div>`;
        msgs.appendChild(ph);
        msgs.scrollTop = msgs.scrollHeight;
        pendingById.set(msgId, ph);

        // USANDO POST API (Caminho estável) em vez de WebSocket para envio
        await postJson('/api/chat', {message: msg, client_msg_id: msgId, source: 'mobile', client_id: clientId});
      }catch(e){
        if(pendingById.has(msgId)){
          try{ pendingById.get(msgId).remove(); }catch(_e){}
          pendingById.delete(msgId);
        }
        addMsg('sys', 'Falha ao enviar: ' + (e?.message || e));
      }
    }

    function normalize(text){
      return String(text||'')
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .toLowerCase()
        .replace(/[^a-z0-9\s]+/g,' ')
        .replace(/\s+/g,' ')
        .trim();
    }

    function stripWake(raw){
      const w = normalize(wakeWord.value || 'zeus');
      const n = normalize(raw);
      const re = new RegExp(`\\b${w.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&')}\\b`, 'i');
      return n.replace(re, '').trim();
    }

    async function sendVoiceBlob(blob){
      ttsUnlocked = true;
      const b64 = await new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(String(fr.result||''));
        fr.onerror = () => reject(fr.error);
        fr.readAsDataURL(blob);
      });
      try{
        // Feedback visual imediato de envio
        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'msg sys pending';
        loadingMsg.innerHTML = `<div class="r">SYSTEM</div><div class="t">Transcrevendo áudio...</div>`;
        msgs.appendChild(loadingMsg);
        msgs.scrollTop = msgs.scrollHeight;

        const asr = await postJson('/api/asr', {audio_data_url: b64, lang: 'pt'});
        loadingMsg.remove();

        const rawText = String(asr?.text || '').trim();
        if(!rawText){
          addMsg('sys','(ASR) Não foi possível captar áudio claro.');
          return;
        }
        
        addMsg('sys','(ASR) ' + rawText);
        if(reqWake.checked){
          const w = normalize(wakeWord.value || 'zeus');
          if(!new RegExp(`\\b${w}\\b`, 'i').test(normalize(rawText))){
            addMsg('sys', `Wake não detectado. Chame por "${wakeWord.value}"`);
            return;
          }
          const cmd = stripWake(rawText);
          if(!cmd){
            addMsg('sys', 'Estou ouvindo... diga o comando.');
            return;
          }
          await sendText(cmd);
        }else{
          await sendText(rawText);
        }
      }catch(e){
        addMsg('sys','Erro no ASR: ' + (e?.message || e));
      }
    }

    function supportsMic(){
      return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    }
    function supportsRecorder(){
      return typeof MediaRecorder !== 'undefined';
    }

    async function startRec(){
      if(recorder && recorder.state === 'recording') return;
      recorded = [];
      if(!supportsMic()){
        addMsg('sys','Microfone indisponível (getUserMedia). Use HTTPS ou o botão Upload.');
        throw new Error('getUserMedia indisponível.');
      }
      if(!supportsRecorder()){
        addMsg('sys','MediaRecorder indisponível neste navegador. Use Upload.');
        throw new Error('MediaRecorder indisponível.');
      }
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      try{
        recorder = new MediaRecorder(stream, {mimeType:'audio/webm'});
      }catch(_e){
        recorder = new MediaRecorder(stream);
      }
      recorder.ondataavailable = (e)=>{ if(e.data && e.data.size) recorded.push(e.data); };
      recorder.onstop = async ()=>{
        recBtn.classList.remove('recording');
        const blob = new Blob(recorded, {type: (recorder && recorder.mimeType) ? recorder.mimeType : 'audio/webm'});
        try{ stream.getTracks().forEach(t=>t.stop()); }catch(_e){}
        await sendVoiceBlob(blob);
      };
      recorder.start();
      recBtn.classList.add('recording');
    }

    async function stopRec(){
      try{ if(recorder && recorder.state === 'recording') recorder.stop(); }catch(_e){}
    }

    async function toggleRec(){
      if(recorder && recorder.state === 'recording') return stopRec();
      return startRec();
    }

    sendBtn.onclick = () => sendText(textEl.value);
    recBtn.onclick = () => toggleRec().catch(e=>addMsg('sys','Microfone bloqueado: ' + (e?.message || e)));
    recBtn.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      startRec().catch(err=>addMsg('sys','Microfone bloqueado: ' + (err?.message || err)));
      recBtn._ptt = setTimeout(()=>stopRec(), 6000);
    });
    recBtn.addEventListener('pointerup', ()=>{ clearTimeout(recBtn._ptt); stopRec(); });
    recBtn.addEventListener('pointercancel', ()=>{ clearTimeout(recBtn._ptt); stopRec(); });
    textEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendText(textEl.value); }});

    modeBtns.safe.onclick = () => setMode('safe');
    modeBtns.dev.onclick = () => setMode('dev');
    modeBtns.auto.onclick = () => setMode('auto');
    panicBtn.onclick = triggerPanic;

    connect();
    hostInfo.textContent = `Host: ${location.protocol}//${location.host}`;
    addMsg('sys', 'Conecte o celular no mesmo Wi‑Fi do host e acesse /static/mobile.html');
    // Fallback universal: input file com capture=mic (funciona em browsers sem MediaRecorder/getUserMedia)
    fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'audio/*';
    fileInput.setAttribute('capture','microphone');
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);
    const uploadBtn = document.createElement('button');
    uploadBtn.textContent = 'Upload';
    uploadBtn.onclick = ()=>fileInput.click();
    document.querySelector('.btnRow').appendChild(uploadBtn);
    fileInput.onchange = async ()=>{
      const f = fileInput.files && fileInput.files[0];
      fileInput.value = '';
      if(!f) return;
      try{
        addMsg('sys', '(upload) enviando áudio…');
        await sendVoiceBlob(f);
      }catch(e){
        addMsg('sys','Falha ao enviar upload: ' + (e?.message || e));
      }
    };
    if(!supportsMic()){
      addMsg('sys','Aviso: getUserMedia indisponível. Se estiver em HTTP, troque para HTTPS (ou use Upload).');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
          .then((reg) => console.log('[ServiceWorker] Registrado com sucesso:', reg.scope))
          .catch((err) => console.error('[ServiceWorker] Falha ao registrar:', err));
      });
    }
  </script>

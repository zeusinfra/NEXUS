*{box-sizing:border-box;margin:0;padding:0}
:root {
    --c: #00ff41; /* Matrix Green */
    --c2: #008f11;

    --bg: #050505;
    --bg2: #0a0a0a;

}
    :root {

    * {

      font-family: var(--font-main);
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      grid-template-rows: 60px 1fr;
    }

body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 3px 100%;
    pointer-events: none;
    z-index: 1000;

}

/* CENTER */
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.center::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0, 255, 65, 0.03) 0px, rgba(0, 255, 65, 0.03) 1px, transparent 1px, transparent 2px);

}
#orb-canvas{width:100%;height:100%;position:absolute;inset:0;z-index:1;display:block;filter: hue-rotate(120deg) brightness(1.2) contrast(1.2);}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* NEURAL LABELS */

    font-family: var(--font-mono);

    text-transform: uppercase;

    opacity: 0.7;

    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

}
.neural-label .line {

<script>
// === THREE.JS NEURAL NETWORK ===
const canvas=document.getElementById('orb-canvas');
const orbFallback=document.getElementById('orb-fallback');
const orbFallbackText=document.getElementById('orb-fallback-text');
const orbRetryBtn=document.getElementById('orb-retry-btn');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050505);
const camera=new THREE.PerspectiveCamera(55,1,0.01,60);
camera.position.set(0,0,8.5);
let renderer=null;
let composer=null;
let bloomPass=null;
let controls=null;
const raycaster=new THREE.Raycaster();
raycaster.params.Points={threshold:0.08};
const mouseNdc=new THREE.Vector2(999,999);
let resizeRetryId=0;
let orbReady=false;
let rendererLost=false;
let reinitInFlight=false;

function showOrbFallback(message){
  orbFallbackText.textContent=message||'Reconectando o globo neural com segurança.';
  orbFallback.classList.add('visible');
}

function hideOrbFallback(){
  orbFallback.classList.remove('visible');
}

function createRenderer(){
  const nextRenderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
  nextRenderer.setClearColor(0x050505,1);
  nextRenderer.setPixelRatio(window.devicePixelRatio ? Math.min(window.devicePixelRatio, 2) : 1);
  renderer=nextRenderer;

  controls=new THREE.OrbitControls(camera,canvas);
  controls.enableDamping=true;
  controls.dampingFactor=0.06;
  controls.enablePan=false;
  controls.minDistance=2.8;
  controls.maxDistance=6.5;

  composer=new THREE.EffectComposer(renderer);
  composer.addPass(new THREE.RenderPass(scene,camera));
  bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(1,1),0.95,0.45,0.06);
  bloomPass.threshold=0.18;
  bloomPass.strength=0.9;
  bloomPass.radius=0.95;
  composer.addPass(bloomPass);
}

function resizeCanvas(){
  if(!renderer)return false;
  const rect=canvas.parentElement.getBoundingClientRect();
  if(!rect.width||!rect.height){
    cancelAnimationFrame(resizeRetryId);
    resizeRetryId=requestAnimationFrame(resizeCanvas);
    return false;
  }
  renderer.setSize(rect.width,rect.height,false);
  if(composer)composer.setSize(rect.width,rect.height);
  if(bloomPass)bloomPass.setSize(rect.width,rect.height);
  camera.aspect=rect.width/rect.height;
  camera.updateProjectionMatrix();
  return true;
}
function toggleMic(){
  const btn = document.getElementById('mic-btn');
  const icon = document.getElementById('mic-icon');
  
  if(window._mic_active){
    window._mic_active = false;
    icon.textContent = '🎙️';
    btn.style.color = 'var(--c3)';
    setCoreStatus('Escuta manual desativada.');
    // Notifica o backend para parar se necessário (opcional)
  } else {
    window._mic_active = true;
    icon.textContent = '⭕';
    btn.style.color = '#ff4444';
    setCoreStatus('Escuta manual ativa: pode falar agora.');
    pulseOrb(0.3);
    if(socket && socket.connected){
      socket.emit('arm_voice', {duration: 15});
    }
  }
}
function scheduleResize(){
  cancelAnimationFrame(resizeRetryId);
  resizeRetryId=requestAnimationFrame(()=>requestAnimationFrame(resizeCanvas));
}
function waitForLayout(maxAttempts=120){
  return new Promise(resolve=>{
    let attempts=0;
    function probe(){
      const rect=canvas.parentElement.getBoundingClientRect();
      if(rect.width>0 && rect.height>0)return resolve(true);
      attempts+=1;
      if(attempts>=maxAttempts)return resolve(false);
      requestAnimationFrame(probe);
    }
    probe();
  });
}

async function ensureOrbReady(reason='layout'){
  if(orbReady && renderer && !rendererLost){
    scheduleResize();
    return true;
  }
  if(reinitInFlight)return false;
  reinitInFlight=true;
  showOrbFallback(reason==='context' ? 'Contexto visual perdido. Reinicializando o globo neural.' : 'Aguardando area valida para o globo neural.');
  const ready=await waitForLayout();
  if(!ready){
    reinitInFlight=false;
    showOrbFallback('A interface ainda nao tem dimensoes validas para renderizar o globo.');
    return false;
  }
  try{
    if(renderer){
      renderer.dispose();
    }
  }catch(_e){}
  createRenderer();
  orbReady=resizeCanvas();
  rendererLost=false;
  reinitInFlight=false;
  if(orbReady){
    hideOrbFallback();
    return true;
  }
  showOrbFallback('Nao foi possivel sincronizar o canvas do globo.');
  return false;
}

window.addEventListener('load',()=>ensureOrbReady('load'));
addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,120));
if('ResizeObserver' in window){
  new ResizeObserver(()=>resizeCanvas()).observe(canvas.parentElement);
}
canvas.addEventListener('webglcontextlost',event=>{
  event.preventDefault();
  rendererLost=true;
  orbReady=false;
  showOrbFallback('O contexto WebGL foi perdido. Aguardando recuperacao segura do globo neural.');
});
canvas.addEventListener('webglcontextrestored',()=>{
  rendererLost=false;
  ensureOrbReady('context');
});
orbRetryBtn.onclick=()=>ensureOrbReady('manual');
ensureOrbReady('bootstrap');

// === ELITE NEURAL PLEXUS CORE ===

// === ELITE NEURAL PLEXUS (Custom GPU Shaders) ===
const NERVE_COUNT = 650;
const SEGMENTS_PER_NERVE = 22;

const plexusMaterial = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.2,
  blending: THREE.AdditiveBlending
});
window.plexusMaterial = plexusMaterial;

const plexusGroup = new THREE.Group();
window.plexusGroup = plexusGroup;
scene.add(plexusGroup);

const NODE_COUNT = 1800;
const CLUSTER_COUNT = 8;
const CLUSTER_COLORS = [0x00e5ff, 0x8c3cff, 0x00ffaa, 0xff5050, 0xffd700, 0xff00d4, 0x2e6bff, 0xff7a18];
const CLUSTER_NAMES = ["Core", "Logic", "Senses", "Synapse", "Archive", "Pulse", "Network", "Dynamics"];
const clusterInfo = [];
const neuralLabels = [];

function initNeuralLabels() {
    const container = document.getElementById('neural-labels-container');
    container.innerHTML = '';
    neuralLabels.length = 0;
    
    CLUSTER_NAMES.forEach((name, i) => {
        const el = document.createElement('div');
        el.className = 'neural-label';
        el.style.borderColor = '#' + CLUSTER_COLORS[i].toString(16).padStart(6, '0');
        el.innerHTML = `<div class="line" style="background:#${CLUSTER_COLORS[i].toString(16).padStart(6, '0')}"></div>${name}`;
        container.appendChild(el);
        neuralLabels.push({ el, color: CLUSTER_COLORS[i] });
    });
}

async function initKnowledgeGraph() {
  plexusGroup.clear();
  clusterInfo.length = 0;
  
  try {
    const response = await fetch('/api/synapse_graph');
    const data = await response.json();
    
    const nodes = data.nodes;
    const links = data.links;

    const vertices = [];
    const colors = [];
    const edgeVertices = [];
    const edgeColors = [];

    // Mapeamento de IDs para posições para criar as arestas
    const nodePositions = {};

    nodes.forEach((node, i) => {
        const cid = i % CLUSTER_COUNT;
        const color = new THREE.Color(CLUSTER_COLORS[cid]);
        
        // Posicionamento esférico/orgânico baseado no peso
        const radius = 3 + Math.random() * 2;
        const phi = Math.acos(-1 + (2 * i) / nodes.length);
        const theta = Math.sqrt(nodes.length * Math.PI) * phi;
        
        const p = new THREE.Vector3(
            radius * Math.cos(theta) * Math.sin(phi),
            radius * Math.sin(theta) * Math.sin(phi),
            radius * Math.cos(phi)
        );
        
        vertices.push(p.x, p.y, p.z);
        colors.push(color.r, color.g, color.b);
        nodePositions[node.id] = p;
        
        // Adiciona label neural se for um nó importante
        if (i < 10) {
            addNeuralLabel(p, node.name, color);
        }
    });

    links.forEach(link => {
        const sourcePos = nodePositions[link.source];
        const targetPos = nodePositions[link.target];
        
        if (sourcePos && targetPos) {
            edgeVertices.push(sourcePos.x, sourcePos.y, sourcePos.z, targetPos.x, targetPos.y, targetPos.z);
            const color = new THREE.Color(0x00ff88);
            edgeColors.push(color.r, color.g, color.b, color.r, color.g, color.b);
        }
    });

    const nodeGeo = new THREE.BufferGeometry();
    nodeGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    nodeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    const nodeMat = new THREE.PointsMaterial({
        size: 0.08,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
    });
    plexusGroup.add(new THREE.Points(nodeGeo, nodeMat));

    const edgeGeo = new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(edgeVertices, 3));
    edgeGeo.setAttribute('color', new THREE.Float32BufferAttribute(edgeColors, 3));
    const edgeMat = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.15,
        blending: THREE.AdditiveBlending
    });
    const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
    plexusGroup.add(edgeMesh);
    
  } catch (err) {
    console.error("Erro ao carregar grafo sináptico:", err);
  }
}

function addNeuralLabel(pos, text, color) {
    const container = document.getElementById('neural-labels-container');
    const el = document.createElement('div');
    el.className = 'neural-label';
    el.style.borderColor = '#' + color.getHexString();
    el.innerHTML = `<div class="line" style="background:#${color.getHexString()}"></div>${text}`;
    container.appendChild(el);
    // Armazena posição 3D para o loop de animação
    if (!window.activeLabels) window.activeLabels = [];
    window.activeLabels.push({ el, pos: pos.clone(), color: color });
}

// Botão de Modo Sonho
const dreamBtn = document.createElement('button');
dreamBtn.innerHTML = '🌙 MODO SONHO';
dreamBtn.style = 'position:fixed; bottom:20px; right:20px; background:var(--panel-bg); color:var(--accent); border:1px solid var(--accent); padding:10px 20px; border-radius:20px; font-family:var(--font-mono); font-size:0.7rem; cursor:pointer; z-index:1000;';
dreamBtn.onclick = async () => {
    dreamBtn.innerHTML = '✨ SONHANDO...';
    try {
        const res = await fetch('/api/dream', { method: 'POST' });
        const data = await res.json();
        alert(`Ciclo de sono concluído! ${data.pruned_synapses} sinapses podadas.`);
        initKnowledgeGraph();
    } catch(e) { alert('Erro ao iniciar ciclo de sono.'); }
    dreamBtn.innerHTML = '🌙 MODO SONHO';
};
document.body.appendChild(dreamBtn);

initKnowledgeGraph();
setInterval(initKnowledgeGraph, 30000); // Atualiza a cada 30s

// --- ADVANCED NEURAL SINGULARITY ---
const singularityGroup = new THREE.Group();
scene.add(singularityGroup);

// 1. Inner Core (The Power Source)
const innerCoreGeo = new THREE.IcosahedronGeometry(0.15, 4);
const innerCoreMat = new THREE.MeshPhongMaterial({ 
  color: 0x00e5ff, 
  emissive: 0x00e5ff,
  emissiveIntensity: 3,
  transparent: true,
  opacity: 0.9 
});
const innerCore = new THREE.Mesh(innerCoreGeo, innerCoreMat);
singularityGroup.add(innerCore);
window.singularity = innerCore;

// 2. Outer Wireframe Shell (Digital Structure)
const shellGeo = new THREE.DodecahedronGeometry(0.28, 1);
const shellMat = new THREE.MeshBasicMaterial({ 
  color: 0x00e5ff, 
  wireframe: true,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending 
});
const shell = new THREE.Mesh(shellGeo, shellMat);
singularityGroup.add(shell);
window.coreShell = shell;

// 3. Neural Dust (Particle Swarm)
const particleCount = 180;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
for(let i=0; i<particleCount * 3; i++) {
  pPositions[i] = (Math.random() - 0.5) * 1.5;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const pMat = new THREE.PointsMaterial({
  color: 0x00e5ff,
  size: 0.02,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending
});
const pPoints = new THREE.Points(particleGeo, pMat);
singularityGroup.add(pPoints);
window.coreParticles = pPoints;

// 4. Double Energy Rings
const createRing = (radius, tiltX, tiltZ) => {
  const ringGeo = new THREE.TorusGeometry(radius, 0.003, 16, 100);
  const ringMat = new THREE.MeshBasicMaterial({ 
    color: 0x00e5ff, 
    transparent: true, 
    opacity: 0.3,
    blending: THREE.AdditiveBlending 
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = tiltX;
  ring.rotation.z = tiltZ;
  return ring;
};
const ring1 = createRing(0.4, Math.PI / 2, 0.2);
const ring2 = createRing(0.45, Math.PI / 3, -0.4);
singularityGroup.add(ring1);
singularityGroup.add(ring2);
window.ring1 = ring1;
window.ring2 = ring2;

const coreSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map: new THREE.CanvasTexture((()=>{
    const c=document.createElement('canvas'); c.width=256; c.height=256;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(128,128,0,128,128,128);
    g.addColorStop(0,'rgba(255,255,255,1)'); 
    g.addColorStop(0.15,'rgba(0,229,255,0.6)'); 
    g.addColorStop(0.4,'rgba(0,100,255,0.15)'); 
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
    ctx.fillStyle='rgba(0,229,255,0.2)'; ctx.fillRect(0,124,256,8); // Wider flare
    return c;
  })()),
  blending: THREE.AdditiveBlending, transparent: true, opacity: 0.9
}));
coreSprite.scale.set(3.5, 3.5, 1);
window.coreSprite = coreSprite;
scene.add(coreSprite);

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)/Math.max(1,rect.width);
  const y=(e.clientY-rect.top)/Math.max(1,rect.height);
  mouseNdc.set(x*2-1,-(y*2-1));
});
canvas.addEventListener('mouseleave',()=>mouseNdc.set(999,999));

// === NEURAL BRIDGE SYSTEM ===
const bridgeGroup = new THREE.Group();
scene.add(bridgeGroup);

function createNeuralBridges() {
  bridgeGroup.clear();
  if (!clusterInfo.length) return;

    // Core-to-cluster bridges (Energy Beams)
    clusterInfo.forEach((cluster, idx) => {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0, cluster.center.x, cluster.center.y, cluster.center.z], 3));
        const mat = new THREE.LineBasicMaterial({
            color: cluster.color,
            transparent: true,
            opacity: 0.1,

        });
        const line = new THREE.Line(geo, mat);

        bridgeGroup.add(line);
    });

  // Inter-cluster bridges
  for (let i = 0; i < clusterInfo.length; i++) {
    for (let j = i + 1; j < clusterInfo.length; j++) {
      if (clusterInfo[i].center.distanceTo(clusterInfo[j].center) < 6) {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute([
          clusterInfo[i].center.x, clusterInfo[i].center.y, clusterInfo[i].center.z,
          clusterInfo[j].center.x, clusterInfo[j].center.y, clusterInfo[j].center.z
        ], 3));
        const mixColor = clusterInfo[i].color.clone().lerp(clusterInfo[j].color, 0.5);
        const mat = new THREE.LineBasicMaterial({
          color: mixColor,
          transparent: true,
          opacity: 0,
          blending: THREE.AdditiveBlending
        });
        const line = new THREE.Line(geo, mat);
        line.userData = { type: 'inter', a: i, b: j };
        bridgeGroup.add(line);
      }
    }
  }
  window.bridgeGroup = bridgeGroup;
}

function animateCore() {

    if(window.coreShell) {
        window.coreShell.rotation.y += 0.005;
        window.coreShell.rotation.x += 0.003;
        const s = 1 + Math.sin(time * 2) * 0.05;

        for(let i=0; i<positions.length; i+=3) {
            positions[i+1] += Math.sin(time + positions[i]) * 0.001;
        }
        window.coreParticles.geometry.attributes.position.needsUpdate = true;
    }

    // Update Neural Bridges (Beams) Visibility
    if(window.bridgeGroup) {
        bridgeGroup.children.forEach(beam => {
            if(beam.userData.type === 'core') {
                const idx = beam.userData.idx;
                const active = (idx === window.dominantIdx || idx === window.closestCluster);
                const targetOp = active ? (0.6 + Math.sin(Date.now()*0.01)*0.2) : 0.05;
                beam.material.opacity += (targetOp - beam.material.opacity) * 0.1;
            }

    }

    // Update Floating Labels
    if (neuralLabels.length && clusterInfo.length && renderer) {
        const widthHalf = canvas.clientWidth / 2;
        const heightHalf = canvas.clientHeight / 2;
        const tempVec = new THREE.Vector3();

        clusterInfo.forEach((c, i) => {
            tempVec.copy(c.center);
            tempVec.project(camera);

            const x = (tempVec.x * widthHalf) + widthHalf;
            const y = -(tempVec.y * heightHalf) + heightHalf;

            const label = neuralLabels[i];
            if (label) {
                if (tempVec.z < 1 && x > 0 && x < canvas.clientWidth && y > 0 && y < canvas.clientHeight) {
                    label.el.style.display = 'block';
                    const active = (i === window.dominantIdx || i === window.closestCluster);
                    const color = '#' + CLUSTER_COLORS[i].toString(16).padStart(6, '0');

                    label.el.style.boxShadow = active ? `0 0 20px rgba(0,0,0,0.5), inset 0 0 10px ${color}33` : `0 0 10px rgba(0,0,0,0.5)`;
                    label.el.style.transform = `translate(${x}px, ${y}px) scale(${active ? 1.1 : 1})`;

function normalizeCpuLoad(value){
  if(Array.isArray(value)){
    if(!value.length)return 0;
    const numeric=value.filter(item=>Number.isFinite(Number(item))).map(Number);
    if(!numeric.length)return 0;
    return numeric.reduce((sum,item)=>sum+item,0)/numeric.length;
  }
  const numeric=Number(value);
  return Number.isFinite(numeric) ? numeric : 0;
}

function reactToSignal(kind,payload={}){
  const intensity=payload.intensity||'medium';
  const intensityPower={low:.1,medium:.18,high:.28,hyperactive:.38};
  const basePower=intensityPower[intensity]||.16;

  if(kind==='METRICS'){
    const cpu=normalizeCpuLoad(payload.cpu);
    const ram=Number.isFinite(Number(payload.ram)) ? Number(payload.ram) : 0;
    const activity=Number(payload.activity_spike||0);
    const recall=Number(payload.learning?.recall_index||0)/100;
    const density=Math.min(1,Number(payload.learning?.memory_density||0)/12);
    applyVisualSignal({
      behavior:payload.behavioral_state,
      recall,
      density,
      path:payload.learning?.hottest_path,
      headline:payload.system_update?.headline,
      entropy:Math.min(1,activity/80),
    });
    const load=Math.max(cpu,ram)/100;
    pulseOrb(.08+load*.12+recall*.08+density*.06+Math.min(.1,activity/200),load*.03+recall*.02,-load*.015-density*.01);
    return;
  }
  if(kind==='SYNAPSE_FIRE'){
    const profile=payload.signal_profile||{};
    applyVisualSignal({
      project:profile.dominant_project,
      density:Math.min(1,(profile.code_hits||0)/10),
      entropy:Math.min(1,((profile.code_hits||0)+(profile.markdown_hits||0))/12),
    });
    const codeBias=Math.min(.08,(profile.code_hits||0)*.01);
    const mdBias=Math.min(.06,(profile.markdown_hits||0)*.012);
    pulseOrb(basePower+codeBias+mdBias,(Math.random()-.5)*(.05+codeBias),(Math.random()-.5)*(.05+mdBias));
    return;
  }
  if(kind==='FILE_EVENT'){
    pulseOrb(.24,(Math.random()-.5)*.06,(Math.random()-.5)*.06);
    return;
  }
  if(kind==='FILE_EVENT_BATCH'){
    pulseOrb(.32,.03,.02);
    return;
  }
  if(kind==='AI_INSIGHT'){
    pulseOrb(.26,-.02,.015);
    return;
  }
  if(kind==='AUDIT_REPORT'){
    pulseOrb(.22,.01,-.01);
    return;
  }
  if(kind==='WEB_EVENT'){
    pulseOrb(.2,-.03,.02);
    return;
  }
  if(kind==='CHAT_USER'){
    pulseOrb(.28,.03,(Math.random()-.5)*.02);
    return;
  }
  if(kind==='CHAT_AI'){
    pulseOrb(.22,-.02,(Math.random()-.5)*.02);
    return;
  }
  if(kind==='SYSTEM_ALERT'){
    pulseOrb(.35,.04,-.02);
    return;
  }
  pulseOrb(.14,(Math.random()-.5)*.03,(Math.random()-.5)*.03);
}

function animate() {
  requestAnimationFrame(animate);
  if (!renderer || !orbReady || rendererLost) return;
  const t = Date.now() * 0.001;
  // Update Advanced Core
  animateCore();

  if (controls) controls.update();

  // Mood color interpolation
  let finalTarget = targetMoodColor;
  if (voiceStage === 'speaking') finalTarget = MOOD_COLORS.IDLE; // Vibrant Cyan for speech
  else if (voiceStage === 'listening') finalTarget = MOOD_COLORS.THINKING;
  
  currentMoodColor.lerp(finalTarget, 0.05);

  // Dynamics based on energy signals
  voiceBoost *= 0.985;
  const targetEnergy = (0.12 + visualRecall * 0.45 + signalEntropy * 0.55 + voiceBoost * 0.85);
  orbEnergy += (targetEnergy - orbEnergy) * 0.035;

  // Update Graph & Proximity
  let closestCluster = -1;
  if (mouseNdc.x < 2) {
    raycaster.setFromCamera(mouseNdc, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersectPoint);
    
    let minDist = 3.0;
    clusterInfo.forEach((c, idx) => {
      const d = intersectPoint.distanceTo(c.center);
      if (d < minDist) { minDist = d; closestCluster = idx; }
    });
  }

  // === COMBO A: ORGANISMO VIVO ===

  // Determine dominant cluster from behavioral state
  const BEHAVIOR_CLUSTER = { 
    IDLE: 0, 
    CODING: 1, 
    THINKING: 2, 
    SURGE: 3, 
    ADAPTIVE: 4,
    DEEP_FOCUS: 1,  // Maps to Logic/Coding cluster
    DEVELOPMENT: 1,
    MINING: 4,      // Maps to Synapse/Archive cluster
    SECURITY: 3     // Maps to Surge cluster
  };
  const dominantIdx = BEHAVIOR_CLUSTER[visualBehavior.toUpperCase()] || 0;
  const activeIdx = closestCluster >= 0 ? closestCluster : dominantIdx;

  // Update cluster hover states
  clusterInfo.forEach((c, idx) => {
    const isHovered = (idx === closestCluster);
    const isDominant = (idx === dominantIdx);
    const target = isHovered ? 1.0 : (isDominant ? 0.5 : 0.0);
    c.hover += (target - c.hover) * 0.04;
  });

  // (1) ABSORÇÃO DE COR — Core absorbs dominant cluster color
  if (window.singularity && clusterInfo.length > 0) {
    const targetColor = clusterInfo[activeIdx].color;
    const rustBase = new THREE.Color(0xffa500);
    const blended = rustBase.clone().lerp(targetColor, 0.3 + orbEnergy * 0.4);
    singularity.material.color.lerp(blended, 0.03);
  }

  // (2) NÚCLEO ESTÁVEL — No pulsation, steady presence
  if (window.singularity) {
    singularity.scale.setScalar(1.0 + orbEnergy * 0.3);
    singularity.material.opacity = 0.6 + orbEnergy * 0.3;
  }

  // (3) ATRAÇÃO GRAVITACIONAL — Graph contracts toward core when active (rotation disabled)
  if (window.plexusGroup) {
    const attractScale = 1.0 - orbEnergy * 0.12;
    plexusGroup.scale.lerp(new THREE.Vector3(attractScale, attractScale, attractScale), 0.02);
  }

  // (4) TRANSFERÊNCIA DE ENERGIA — Nodes visible, edges clear
  if (window.plexusGroup && plexusGroup.children.length > 0) {
    const nodePoints = plexusGroup.children[0];
    if (nodePoints && nodePoints.material) {
      nodePoints.material.opacity = 0.9 - orbEnergy * 0.15;
    }
    const edgeLines = plexusGroup.children[1];
    if (edgeLines && edgeLines.material) {
      edgeLines.material.opacity = 0.4 - orbEnergy * 0.05;
    }
  }

  // Core sprite follows dominant color
  if (window.coreSprite) {
    const isFocus = (visualBehavior === 'deep_focus' || visualBehavior === 'DEEP_FOCUS');
    const pulseSpeed = isFocus ? 3.0 : 1.5;
    coreSprite.scale.setScalar(2.0 + orbEnergy * 2.5 + Math.sin(t * pulseSpeed) * (isFocus ? 0.5 : 0.2));
    coreSprite.material.opacity = 0.15 + orbEnergy * 0.35;
    coreSprite.material.color.lerp(currentMoodColor, 0.03);
    
    // Extra rotation for focus
    if(isFocus && window.singularityGroup) {
        singularityGroup.rotation.y += 0.015;
    }
  }

  // (5) PONTES NEURAIS — Bridges appear on active clusters, no pulsing
  if (window.bridgeGroup) {
    bridgeGroup.children.forEach(line => {
      let targetOpacity = 0;
      if (line.userData.type === 'core') {
        const activity = clusterInfo[line.userData.idx].hover;
        targetOpacity = activity > 0.1 ? 0.15 + activity * 0.35 : 0;
      } else if (line.userData.type === 'inter') {
        const actA = clusterInfo[line.userData.a].hover;
        const actB = clusterInfo[line.userData.b].hover;
        const joint = Math.min(actA, actB);
        targetOpacity = joint > 0.1 ? 0.1 + joint * 0.25 : 0;
      }
      line.material.opacity += (targetOpacity - line.material.opacity) * 0.04;
    });
  }

  try {
    if (composer) composer.render();
    else renderer.render(scene, camera);
  } catch (err) {
    console.error('Render failure', err);
    orbReady = false;
  }
}

    el.style.cssText = 'border:1px solid var(--border); border-radius:8px; background:rgba(0,0,0,0.28); padding:12px; font-family:var(--font-mono); font-size:0.76rem; line-height:1.45;';
    el.innerHTML = `
      <div style="display:flex; justify-content:space-between; gap:8px; margin-bottom:8px;">
        <strong style="color:var(--accent);">${escapeHtml(status)}</strong>
        <span style="color:var(--text-dim);">${escapeHtml(risk)}</span>
      </div>
      <div style="color:var(--text-dim); margin-bottom:6px;">proposal_id: ${escapeHtml(id)}</div>
      <div style="word-break:break-word; margin-bottom:8px;">${escapeHtml(command)}</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; color:var(--text-dim); margin-bottom:8px;">
        <span>${escapeHtml(pid)}</span><span>${escapeHtml(exitCode)}</span><span>${escapeHtml(duration)}</span>
      </div>
      ${status === 'PROPOSED' || status === 'PENDING_APPROVAL' ? `<div style="display:flex; gap:8px; margin-bottom:8px;"><button data-exec-action="approve" data-proposal-id="${escapeHtml(id)}" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(0,255,136,.08);color:var(--accent);cursor:pointer;">Aprovar</button><button data-exec-action="cancel" data-proposal-id="${escapeHtml(id)}" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,80,80,.08);color:#ff8080;cursor:pointer;">Rejeitar</button></div>` : ''}
      ${status === 'RUNNING' ? `<button data-exec-action="cancel" data-proposal-id="${escapeHtml(id)}" style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:rgba(255,80,80,.08);color:#ff8080;margin-bottom:8px;cursor:pointer;">Cancelar</button>` : ''}
      ${stdout ? `<pre style="white-space:pre-wrap; max-height:120px; overflow:auto; color:var(--accent); margin-bottom:6px;">${escapeHtml(stdout)}</pre>` : ''}
      ${stderr ? `<pre style="white-space:pre-wrap; max-height:120px; overflow:auto; color:#ff8080; margin-bottom:6px;">${escapeHtml(stderr)}</pre>` : ''}
      ${logPath ? `<div style="word-break:break-word; color:var(--text-dim);">log: ${escapeHtml(logPath)}</div>` : ''}
    `;
    list.appendChild(el);
  });
}
async function approveExecution(proposalId){
  const approvalRes = await fetch(`/api/executions/${encodeURIComponent(proposalId)}/approve`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({approved_by:'web_gui',approval_scope:'ONCE',ttl_seconds:600})
  });
  if(!approvalRes.ok) throw new Error(await approvalRes.text());
  const approvalBody = await approvalRes.json();
  const approvalId = approvalBody.approval && approvalBody.approval.approval_id;
  renderExecutionCard(proposalId, {status:'APPROVED', approval_id:approvalId});
  const runRes = await fetch(`/api/executions/${encodeURIComponent(proposalId)}/execute`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({approval_id:approvalId,timeout_s:30})
  });
  if(!runRes.ok) throw new Error(await runRes.text());
  const runBody = await runRes.json();
  renderExecutionCard(proposalId, runBody.execution || {});
}
async function cancelExecution(proposalId){
  const res = await fetch(`/api/executions/${encodeURIComponent(proposalId)}/cancel`, {method:'POST'});
  if(!res.ok) throw new Error(await res.text());
  const body = await res.json();
  renderExecutionCard(proposalId, body.execution || {status:'CANCELLED'});
}
document.addEventListener('click', async event => {
  const btn = event.target.closest('[data-exec-action]');
  if(!btn) return;
  const proposalId = btn.getAttribute('data-proposal-id');
  const action = btn.getAttribute('data-exec-action');
  btn.disabled = true;
  try {
    if(action === 'approve') await approveExecution(proposalId);
    if(action === 'cancel') await cancelExecution(proposalId);
  } catch (err) {
    addLog({title:'EXECUTION ERROR', detail:String(err).slice(0,180)}, 'a');
  } finally {
    btn.disabled = false;
  }
});
// Stub for addMsg (used by WS events CHAT_USER / CHAT_AI)
function addMsg(role, text){
  const prefix = role==='user' ? '[USER]' : '[ZEUS]';

  if(chatConsole){
    const row=document.createElement('div');

    row.innerHTML=`<div class="chat-role">${role==='user'?'User':role==='ai'?'ZEUS':'Tool'}</div><div class="chat-text">${escapeHtml(text||'')}</div>`;
    chatConsole.appendChild(row);
    while(chatConsole.children.length>18)chatConsole.removeChild(chatConsole.firstChild);
    chatConsole.scrollTop=chatConsole.scrollHeight;
  }
  if(role==='ai') {
    pulseOrb(0.3);
    setCoreStatus('Processando resposta neural...');
    setTimeout(()=>setCoreStatus('Aguardando atividade neural...'), 2000);
  }
}

const chatConsole = document.getElementById('chat-console');
let latestHealth = {};
let cpuL = 0;

function setCoreStatus(text) {
  const headline = document.getElementById('up-headline');
  const detail = document.getElementById('up-detail');
  if(headline) headline.textContent = text.split('·')[0] || "SISTEMA NOMINAL";
  if(detail) detail.textContent = text.split('·')[1] || "Aguardando atividade neural...";
}

function addLog(msg, type='l') {
  if(!chatConsole) return;
  const entry = document.createElement('div');
  entry.style.marginBottom = '8px';
  entry.style.borderBottom = '1px solid rgba(255,255,255,0.02)';
  entry.style.paddingBottom = '4px';
  
  const ts = new Date().toLocaleTimeString('pt-BR', { hour12: false });
  const color = type === 'e' ? 'var(--text-dim)' : (type === 'a' ? '#ff5050' : 'var(--accent)');
  
  entry.innerHTML = `<span style="color:var(--text-dim); font-size:0.65rem;">[${ts}]</span> 
                     <span style="color:${color}; font-weight:bold;">${msg.title.toUpperCase()}</span>: 
                     <span style="color:var(--text-dim);">${msg.detail}</span>`;
  
  chatConsole.prepend(entry);
  while(chatConsole.children.length > 50) chatConsole.lastChild.remove();
}

async function refreshHealth() {
  try {
    const res = await fetch('/api/health');
    const h = await res.json();
    document.getElementById('u-mood').textContent = (h.mood || 'STABLE').toUpperCase();
    
    // Update Goals
    const goalsList = document.getElementById('goals-list');
    if(goalsList && h.second_brain && h.second_brain.events) {
        const pending = h.second_brain.events.pending || 0;
        goalsList.innerHTML = `<div style="font-size:0.85rem; padding-left:10px; border-left:2px solid var(--accent);">
                                ${pending > 0 ? `Processando ${pending} eventos` : 'Sincronização Ativa'}
                               </div>`;
    }
  } catch(e) {}
}

// === REALTIME (Socket.IO) ===
function connectRealtime() {
  if(!window.io) return;
  const socket = io();
  
  socket.on('connect', () => {
    addLog({title: 'Rede Neural', detail: 'Conexão estabelecida com o núcleo.'});
  });

  socket.on('message', (d) => {
    if(d.type === 'METRICS') {
      const cpu = Math.round(d.cpu);
      const ram = Math.round(d.ram);
      document.getElementById('u-cpu').textContent = cpu + '%';
      document.getElementById('u-ram').textContent = ram + '%';
      document.getElementById('u-evts').textContent = d.total_events || 0;
      document.getElementById('stat-fill').style.width = cpu + '%';
      
      if(cpu > 80) document.getElementById('u-cpu').style.color = '#ff5050';
      else document.getElementById('u-cpu').style.color = 'var(--accent)';
    } else if(d.type === 'HUD_STATUS') {
      setCoreStatus(d.text);
    } else if(d.type === 'CHAT_AI') {
      const msg = String(d.message || '');
      addLog({title: 'AI RESPONSE', detail: msg.slice(0, 160) + (msg.length > 160 ? '...' : '')});
    } else if(d.type === 'AGENT_PROGRESS') {
      const stage = String(d.stage || 'progress').replace(/_/g, ' ').toUpperCase();
      const tool = d.tool ? ` · ${d.tool}` : '';
      const detail = String(d.text || '').slice(0, 220);
      addLog({title: `AGENT ${stage}${tool}`, detail}, d.stage === 'chat_failed' ? 'e' : 'l');
      if(d.text) setCoreStatus(d.text);
    } else if(d.type === 'TOOL_LOG') {
      const stage = String(d.stage || 'tool').replace(/_/g, ' ').toUpperCase();
      const tool = String(d.tool || 'tool');
      let detail = '';
      if(d.error) detail = String(d.error).slice(0, 220);
      else if(d.result && typeof d.result === 'object') detail = `resultado: ${Object.keys(d.result).slice(0, 5).join(', ')}`;
      else if(d.args && typeof d.args === 'object') detail = `args: ${Object.keys(d.args).slice(0, 5).join(', ')}`;
      addLog({title: `TOOL ${stage} · ${tool}`, detail}, d.stage === 'step_failed' ? 'e' : 'a');
    } else if(d.type === 'EXECUTION_PENDING_APPROVAL') {
      renderExecutionCard(d.proposal_id, {
        status: 'PROPOSED',
        command: d.command,
        cwd: d.cwd,
        risk_level: d.risk_level,
        summary: d.reason || d.summary || ''
      });
      addLog({title: 'EXECUTION PENDING', detail: `${d.risk_level || '--'} · ${String(d.command || '').slice(0, 120)}`}, 'a');
      setCoreStatus('Execução aguardando aprovação · Ledger ativo');
    } else if(d.type === 'EXECUTION_APPROVED') {
      renderExecutionCard(d.proposal_id, {
        status: 'APPROVED',
        approval_id: d.approval_id,
        approval_scope: d.approval_scope,
        expires_at: d.expires_at
      });
      addLog({title: 'EXECUTION APPROVED', detail: d.approval_id || ''}, 'l');
    } else if(d.type === 'EXECUTION_UPDATE') {
      const normalized = normalizeExecutionPayload(d);
      const payload = normalized.payload;
      const proposalId = d.proposal_id || payload.proposal_id;
      if(payload.type === 'EXECUTION_OUTPUT') {
        const current = executionCards.get(proposalId) || {};
        const key = payload.stream === 'stderr' ? 'stderr' : 'stdout';
        renderExecutionCard(proposalId, Object.assign({}, current, {[key]: (current[key] || '') + (payload.chunk || '')}));
      } else {
        renderExecutionCard(proposalId, Object.assign({}, payload, {
          status: payload.status || d.stage || 'RUNNING',
          command: payload.command || d.command
        }));
      }
      addLog({title: 'EXECUTION UPDATE', detail: `${proposalId || '--'} · ${(payload.status || d.stage || 'RUNNING')}`}, payload.status === 'FAILED' ? 'a' : 'l');
    } else if(d.type === 'SYSTEM_ALERT') {
      addLog({title: d.title || 'SYSTEM ALERT', detail: String(d.message || '').slice(0, 180)}, 'e');
    } else if(d.type === 'SYSTEM_EVENT') {
        addLog({title: 'OS PULSE', detail: d.log.detail}, 'e');
    }
  });
}

// Uptime Timer
let startTime = Date.now();
setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('uptime').textContent = `UPTIME: ${h}:${m}:${s}`;
}, 1000);
